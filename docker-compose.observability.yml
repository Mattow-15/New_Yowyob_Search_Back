# Stack d'observabilité yowyob-search (OPTIONNELLE) : métriques (Prometheus), logs (Loki/Promtail)
# et traces (Tempo). Grafana unifie le tout. À lancer EN PLUS du compose principal :
#   docker compose -f docker-compose.prod.yml -f docker-compose.observability.yml up -d
#
# Pour activer l'export des traces, ajouter au .env serveur :
#   TRACING_ENABLED=true
#   OTLP_TRACING_ENDPOINT=http://tempo:4318/v1/traces
# Grafana est exposé sur 127.0.0.1:3001 (accès par tunnel SSH ; pas d'exposition publique).
services:
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - search-net

  loki:
    image: grafana/loki:3.2.1
    restart: unless-stopped
    user: "0"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - search-net

  promtail:
    image: grafana/promtail:3.2.1
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - search-net

  tempo:
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    user: "0"
    command: -config.file=/etc/tempo/config.yaml
    volumes:
      - ./observability/tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/tmp/tempo
    networks:
      - search-net

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - search-net

volumes:
  loki-data:
  tempo-data:
  grafana-data:

networks:
  # Réseau privé partagé avec yowyob-search (créé par docker-compose.prod.yml).
  search-net:
    external: true
    name: yowyob-search-net
