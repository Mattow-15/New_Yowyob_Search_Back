# yowyob-search — service de recherche autonome (PRODUCTION, serveur yowyob).
# Tout projet l'appelle en HTTP : ingestion (PUT/POST /api/index/...) + recherche (GET /api/search).
# ES DÉDIÉ au service (volume durable). Exposé via Traefik sur search.yowyob.com.
services:
  yowyob-search:
    image: "${SEARCH_IMAGE:?SEARCH_IMAGE requis - ex ghcr.io/yowyob/yowyob-search:sha-xxxx}"
    pull_policy: always
    restart: unless-stopped
    env_file: [.env]
    environment:
      SERVER_PORT: "8080"
      ELASTICSEARCH_URIS: http://search-elasticsearch:9200
      # Auth déléguée au kernel : valide X-Client-Id + X-Api-Key via le kernel. Aucune clé statique.
      KERNEL_BASE_URL: ${KERNEL_BASE_URL:-http://kernel-core-kernel-layer-1:8080}
      # Recherche sémantique : micro-service d'embeddings dédié (repli lexical si indisponible).
      EMBEDDING_SERVICE_URL: http://yowyob-embeddings:8000
      SEARCH_AI_ENABLED: "true"
      GROQ_API_KEY: "${GROQ_API_KEY:?GROQ_API_KEY requis}"
      GROQ_MODEL: "${GROQ_MODEL:-llama-3.3-70b-versatile}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.0-flash}"
      CRAWLER_ENABLED: "true"
      CRAWLER_TENANT_ID: "${CRAWLER_TENANT_ID:?CRAWLER_TENANT_ID requis}"
      CRAWLER_SCHEDULE_CRON: "${CRAWLER_SCHEDULE_CRON:-0 15 */6 * * *}"
      GOOGLE_PLACES_API_KEY: "${GOOGLE_PLACES_API_KEY:-}"
    # La recherche NE dépend PAS de la santé d'embeddings : si l'embeddings est absent/KO,
    # elle démarre quand même et dégrade vers le lexical (cf. EmbeddingClient).
    depends_on:
      search-elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health/readiness >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yowyob-search.rule=Host(`search.yowyob.com`) && (PathPrefix(`/api/search`) || PathPrefix(`/api/geo`) || PathPrefix(`/api/index`) || PathPrefix(`/api/crawler`) || PathPrefix(`/actuator`) || PathPrefix(`/v3/api-docs`) || PathPrefix(`/swagger-ui`) || PathPrefix(`/webjars`))"
      - "traefik.http.routers.yowyob-search.entrypoints=websecure"
      - "traefik.http.routers.yowyob-search.tls=true"
      - "traefik.http.routers.yowyob-search.tls.certresolver=letsencrypt"
      - "traefik.http.routers.yowyob-search.priority=100"
      - "traefik.http.services.yowyob-search.loadbalancer.server.port=8080"
      - "traefik.docker.network=yowyob"
    networks:
      - search-net
      - yowyob

  search-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    pull_policy: if_not_present
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - cluster.name=yowyob-search
      - ES_JAVA_OPTS=-Xms512m -Xmx1g
    volumes:
      - search-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - search-net

  # Micro-service d'embeddings (sémantique). Image publiée sur GHCR par la CI.
  yowyob-embeddings:
    image: "${EMBEDDINGS_IMAGE:-ghcr.io/yowyob/yowyob-search-embeddings:latest}"
    pull_policy: always
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)\""]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - search-net

volumes:
  search-es-data:

networks:
  # Réseau privé service <-> son ES dédié.
  search-net:
    name: yowyob-search-net
  # Réseau partagé du serveur (Traefik + accès interne par les autres projets).
  yowyob:
    external: true
    name: yowyob
