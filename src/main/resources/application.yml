spring:
  application:
    name: yowyob-search
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    # Tracing opt-in : activé seulement quand la stack d'observabilité tourne, pour éviter
    # tout bruit/erreur d'export quand aucun collecteur n'est présent.
    enabled: ${TRACING_ENABLED:false}
    sampling:
      # Échantillonnage des traces (1.0 = tout ; baisser en prod si volume élevé).
      probability: ${TRACING_SAMPLE_PROBABILITY:0.1}
  otlp:
    tracing:
      # Endpoint OTLP de Tempo (utilisé quand TRACING_ENABLED=true) :
      #   OTLP_TRACING_ENDPOINT=http://tempo:4318/v1/traces
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

yowyob:
  search:
    auth:
      # Auth déléguée au kernel : chaque appel présente X-Client-Id + X-Api-Key d'un clientApplication
      # du kernel, validé via GET /api/client-applications/me. Aucun secret statique, aucun rechargement.
      enabled: ${SEARCH_AUTH_ENABLED:true}
      kernel-base-url: ${KERNEL_BASE_URL:http://kernel-core-kernel-layer-1:8080}
      cache-ttl-seconds: ${SEARCH_AUTH_CACHE_TTL:300}
    embedding:
      # Recherche sémantique : chaque document est enrichi d'un vecteur (textVector) via le
      # micro-service yowyob-embeddings, et les requêtes combinent lexical (edge-ngram) + kNN.
      # Si désactivé ou si le service est injoignable, on dégrade vers le lexical seul.
      enabled: ${SEARCH_EMBEDDING_ENABLED:true}
      url: ${EMBEDDING_SERVICE_URL:http://localhost:8000}
      dimensions: ${SEARCH_EMBEDDING_DIMENSIONS:384}
      k: ${SEARCH_EMBEDDING_K:20}
      num-candidates: ${SEARCH_EMBEDDING_NUM_CANDIDATES:100}
      boost: ${SEARCH_EMBEDDING_BOOST:2.0}
    ai:
      enabled: ${SEARCH_AI_ENABLED:true}
      groq-api-key: ${GROQ_API_KEY:}
      groq-model: ${GROQ_MODEL:llama-3.3-70b-versatile}
      gemini-api-key: ${GEMINI_API_KEY:}
      gemini-model: ${GEMINI_MODEL:gemini-2.0-flash}
    geo:
      # Géolocalisation : géocodage d'adresse (Nominatim/OSM + gazetteer Cameroun intégré) et
      # recherche de proximité (lat/lon, ville, ou « près de moi » via géoloc de l'IP appelante).
      enabled: ${SEARCH_GEO_ENABLED:true}
      nominatim-url: ${NOMINATIM_URL:https://nominatim.openstreetmap.org}
      ipapi-url: ${IPAPI_URL:https://ipapi.co}
      user-agent: ${GEO_USER_AGENT:yowyob-search}
      default-lat: ${GEO_DEFAULT_LAT:4.0511}
      default-lon: ${GEO_DEFAULT_LON:9.7679}
      default-radius-km: ${GEO_DEFAULT_RADIUS_KM:10.0}

# Crawler OpenStreetMap (optionnel, désactivé par défaut). S'il est activé, il indexe directement
# (sans saut HTTP) des points d'intérêt sous le tenant/collection configurés. crawler.tenant-id est
# REQUIS quand enabled=true. schedule-cron="-" = pas de crawl automatique (manuel via /api/crawler/run).
crawler:
  enabled: ${CRAWLER_ENABLED:false}
  overpass-url: ${OVERPASS_URL:https://overpass-api.de/api/interpreter}
  user-agent: ${CRAWLER_USER_AGENT:yowyob-crawler/1.0}
  schedule-cron: ${CRAWLER_SCHEDULE_CRON:-}
  tenant-id: ${CRAWLER_TENANT_ID:}
  collection: ${CRAWLER_COLLECTION:places}
  osm-types: ${CRAWLER_OSM_TYPES:restaurant,pharmacy,bank,fuel,hospital,hotel}
  google-places-api-key: ${GOOGLE_PLACES_API_KEY:}
  cities:
    - { name: Douala, lat: 4.0511, lng: 9.7679, radiusMeters: 8000 }
    - { name: Yaoundé, lat: 3.8480, lng: 11.5021, radiusMeters: 8000 }
