spring:
  application:
    name: yowyob-search
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

yowyob:
  search:
    auth:
      # Auth déléguée au kernel : chaque appel présente X-Client-Id + X-Api-Key d'un clientApplication
      # du kernel, validé via GET /api/client-applications/me. Aucun secret statique, aucun rechargement.
      enabled: ${SEARCH_AUTH_ENABLED:true}
      kernel-base-url: ${KERNEL_BASE_URL:http://kernel-core-kernel-layer-1:8080}
      cache-ttl-seconds: ${SEARCH_AUTH_CACHE_TTL:300}
