name: Deploy (server)

# Déploie yowyob-search après publication GHCR. Le serveur ne reçoit que docker-compose.prod.yml,
# puis pull + up de l'image GHCR. Le .env (SEARCH_API_KEYS) reste géré UNIQUEMENT sur le serveur.

on:
  workflow_run:
    # Déclenché après la publication de l'image de recherche OU de l'image embeddings
    # (cette dernière est longue à builder : un 2e passage de deploy la prendra en compte).
    workflows: ["Publish Docker image (GHCR)", "Publish Embeddings image (GHCR)"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-yowyob-search
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.repository == 'yowyob/yowyob-search' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Checkout (pour docker-compose.prod.yml)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Calculer le tag d'image immuable (GHCR, par SHA)
        id: img
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          REPO="${GITHUB_REPOSITORY,,}"
          echo "image=ghcr.io/${REPO}:sha-${SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Préparer la clé SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ vars.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copier le docker-compose.prod.yml
        run: |
          scp -i ~/.ssh/id_deploy docker-compose.prod.yml \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}:${{ vars.SEARCH_DIR }}/docker-compose.prod.yml"

      - name: Pull + up sur le serveur
        env:
          SEARCH_IMAGE: ${{ steps.img.outputs.image }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          CRAWLER_TENANT_ID: ${{ secrets.CRAWLER_TENANT_ID }}
        run: |
          ssh -i ~/.ssh/id_deploy "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" "
            set -e
            cd '${{ vars.SEARCH_DIR }}'
            export SEARCH_IMAGE='${SEARCH_IMAGE}'
            export GROQ_API_KEY='${GROQ_API_KEY}'
            export GEMINI_API_KEY='${GEMINI_API_KEY}'
            export GOOGLE_PLACES_API_KEY='${GOOGLE_PLACES_API_KEY}'
            export CRAWLER_TENANT_ID='${CRAWLER_TENANT_ID}'
            # Cœur (ES + recherche) : requis, doit toujours monter.
            docker compose -f docker-compose.prod.yml pull yowyob-search
            docker compose -f docker-compose.prod.yml up -d search-elasticsearch yowyob-search
            # Embeddings (image longue à builder) : best-effort, monte dès qu'elle est publiée.
            docker compose -f docker-compose.prod.yml pull yowyob-embeddings && \
              docker compose -f docker-compose.prod.yml up -d yowyob-embeddings || \
              echo 'Image embeddings pas encore disponible : la recherche tourne en lexical en attendant.'
            docker compose -f docker-compose.prod.yml ps
            docker image prune -f
          "
