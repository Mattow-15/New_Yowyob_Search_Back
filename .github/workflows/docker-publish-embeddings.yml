name: Publish Embeddings image (GHCR)

# Construit/pousse l'image du micro-service d'embeddings (yowyob-embeddings) sur GHCR.
# Rebuild uniquement quand le code embeddings change (l'image est lourde : torch + modèle).
on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "yowyob-embeddings/**"
      - ".github/workflows/docker-publish-embeddings.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push embeddings
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.repository == 'yowyob/yowyob-search'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-embeddings" >> "$GITHUB_OUTPUT"
      - name: Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=ref,event=tag
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./yowyob-embeddings
          file: ./yowyob-embeddings/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
