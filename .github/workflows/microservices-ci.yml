name: Validate Search microservices

on:
  push:
    branches: [main]
    paths:
      - "microservices/**"
      - ".github/workflows/microservices-ci.yml"
  pull_request:
    paths:
      - "microservices/**"
      - ".github/workflows/microservices-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - api-gateway
          - auth-service
          - geo-service
          - listing-service
          - notification-service
          - search-service
          - user-service
          - yowyob-crawler-reconfigured
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: microservices/${{ matrix.module }}/pom.xml
      - run: mvn -q -f "microservices/${{ matrix.module }}/pom.xml" test
