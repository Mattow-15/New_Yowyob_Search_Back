version: '3.8'

# =============================================
# docker-compose.light.yml
# Mode économique RAM – sans Kafka/Zookeeper/Crawler
# Usage: docker compose -f docker-compose.light.yml up -d
# =============================================

services:
  postgres:
    image: postgres:17-alpine
    container_name: yowyob-postgres
    environment:
      POSTGRES_DB: yowyob_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_17_v1:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  elasticsearch:
    image: elasticsearch:9.4.2
    container_name: yowyob-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - app-network
    healthcheck:
      test: curl -s http://localhost:9200 >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: yowyob-redis
    ports:
      - "6379:6379"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 128M

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: yowyob-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ========== MICROSERVICES ==========

  geo-final:
    build:
      context: ./geo-service
      dockerfile: Dockerfile
    container_name: geo-final
    ports:
      - "8085:8085"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      - JAVA_OPTS=-Xmx128m -Xms64m
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - app-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    deploy:
      resources:
        limits:
          memory: 384M
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx256m -Xms128m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/yowyob_auth
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - JWT_SECRET=yowyob-super-secret-key-change-this-in-production-minimum-256-bits
      # Kafka désactivé (mode light)
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8084:8084"
    deploy:
      resources:
        limits:
          memory: 384M
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx256m -Xms128m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/yowyob_users
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  listing-service:
    build:
      context: ./listing-service
      dockerfile: Dockerfile
    container_name: listing-service
    ports:
      - "8083:8083"
    deploy:
      resources:
        limits:
          memory: 384M
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx256m -Xms128m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/yowyob_listings
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - app-network

  search-final:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    container_name: search-final
    ports:
      - "8082:8082"
    deploy:
      resources:
        limits:
          memory: 384M
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx256m -Xms128m
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_started
      geo-final:
        condition: service_started
    networks:
      - app-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 384M
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx256m -Xms128m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/yowyob_auth
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - JWT_SECRET=yowyob-super-secret-key-change-this-in-production-minimum-256-bits
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      # Auth déléguée au Kernel (fallback auth-service local si KERNEL_BASE_URL absent)
      - KERNEL_BASE_URL=${KERNEL_BASE_URL:-}
      - AUTH_SERVICE_URL=${KERNEL_BASE_URL:-http://auth-service:8081}
      - KERNEL_JWKS_URI=${KERNEL_BASE_URL:-}/.well-known/jwks.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

volumes:
  postgres_data_17_v1:
  elasticsearch_data:

networks:
  app-network:
    driver: bridge
