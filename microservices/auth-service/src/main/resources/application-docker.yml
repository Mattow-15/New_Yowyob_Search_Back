spring:
  application:
    name: auth-service

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}
      ssl.endpoint.identification.algorithm: ${KAFKA_SSL_ENDPOINT_ID_ALGO:https}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://yowyob-postgres:5432/yowyob_auth}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:8081}

jwt:
  secret: yowyob-super-secret-key-change-this-in-production-minimum-256-bits
  expiration: 3600000
  refresh-expiration: 604800000

google:
  client-id: ${GOOGLE_CLIENT_ID:763004243989-g1fftlketknf2ip32f0fsi39ukcqqkq3.apps.googleusercontent.com}

cors:
  allowed-origins: http://localhost:3000,https://yowyob.com
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
