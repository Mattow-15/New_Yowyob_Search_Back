version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: yowyob-postgres
    environment:
      POSTGRES_DB: yowyob_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_17_v1:/var/lib/postgresql/data
      # - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: yowyob-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - app-network
    healthcheck:
      test: curl -s http://localhost:9200 >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: yowyob-redis
    ports:
      - "6379:6379"
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: yowyob-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: yowyob-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - app-network

  # ========== MONOLITH ==========

  yowyob-monolith:
    image: yowyob-monolith-semantic:latest
    container_name: yowyob-monolith
    ports:
      - "8080:8080"
    volumes:
      - app-logs:/var/log/app
    environment:
      # --- Database ---
      - SPRING_DATASOURCE_AUTH_URL=jdbc:postgresql://postgres:5432/yowyob_auth
      - SPRING_DATASOURCE_AUTH_USERNAME=postgres
      - SPRING_DATASOURCE_AUTH_PASSWORD=postgres
      - SPRING_DATASOURCE_USERS_URL=jdbc:postgresql://postgres:5432/yowyob_users
      - SPRING_DATASOURCE_USERS_USERNAME=postgres
      - SPRING_DATASOURCE_USERS_PASSWORD=postgres
      - SPRING_DATASOURCE_LISTINGS_URL=jdbc:postgresql://postgres:5432/yowyob_listings
      - SPRING_DATASOURCE_LISTINGS_USERNAME=postgres
      - SPRING_DATASOURCE_LISTINGS_PASSWORD=postgres
      # --- Elasticsearch ---
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      # --- Redis ---
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      # --- RabbitMQ ---
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      # --- JWT ---
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      # --- Google Auth ---
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-your-google-client-id}
      # --- Geo ---
      - APP_NOMINATIM_URL=https://nominatim.openstreetmap.org
      - APP_NOMINATIM_USER_AGENT=YowYob-Search-Engine
      # --- Logging ---
      - LOGGING_FILE_NAME=/var/log/app/application.log
      # --- CORS ---
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
      # --- Embeddings ---
      - EMBEDDING_SERVICE_URL=http://yowyob-embeddings:8000
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      yowyob-embeddings:
        condition: service_started
    networks:
      - app-network

  # ========== EMBEDDINGS SERVICE ==========

  yowyob-embeddings:
    image: yowyob-embeddings:latest
    container_name: yowyob-embeddings
    ports:
      - "8000:8000"
    networks:
      - app-network
    environment:
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1

  # ========== CRAWLER (Separate) ==========

  crawler-service:
    build:
      context: ./yowyob-crawler-reconfigured
      dockerfile: Dockerfile
    container_name: crawler-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - LISTING_SERVICE_URL=http://yowyob-monolith:8080
      - USER_SERVICE_URL=http://yowyob-monolith:8080
      - SERVICE_LISTING_ENABLED=true
      - SERVICE_USER_ENABLED=true
      - SERVICE_BUSINESSBOOK_ENABLED=true
      - BUSINESSBOOK_SERVICE_URL=https://businessbookr-production.up.railway.app/api/businessbook/search/documents
      - CRAWLER_CONNECTORS_ENABLED=true
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - app-network

  # ========== MONITORING ==========

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - app-network

  loki:
    image: grafana/loki:2.9.2
    container_name: loki
    restart: unless-stopped
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app-network

  promtail:
    image: grafana/promtail:2.9.2
    container_name: promtail
    restart: unless-stopped
    volumes:
      - app-logs:/var/log/app:ro
      - ./promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - app-network

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    user: "0"
    ports:
      - "3200:3200"
      - "4318:4318"
      - "9411:9411"
    volumes:
      - ./tempo-config.yaml:/etc/tempo/config.yaml
      - tempo_data:/tmp/tempo
    command: -config.file=/etc/tempo/config.yaml
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=rtchapetngamini@gmail.com
      - GF_SMTP_PASSWORD=avihfivmwtwsalhz
      - GF_SMTP_FROM_ADDRESS=rtchapetngamini@gmail.com
      - GF_SMTP_FROM_NAME=Grafana Alerts
      - GF_SMTP_SKIP_VERIFY=false
      - GF_ALERTING_ENABLED=true
      - GF_UNIFIED_ALERTING_ENABLED=true
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana1/provisioning/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - loki
      - prometheus
      - tempo
    networks:
      - app-network

volumes:
  postgres_data_17_v1:
  elasticsearch_data:
  grafana_data:
  tempo_data:
  loki_data:
  app-logs:

networks:
  app-network:
    driver: bridge
