server:
  port: ${PORT:8080}

spring:
  application:
    name: yowyob-monolith
  main:
    allow-bean-definition-overriding: true

  # ==================== Auth Datasource (default) ====================
  datasource:
    url: ${SPRING_DATASOURCE_AUTH_URL:jdbc:postgresql://yowyob-postgres:5432/yowyob_auth}
    username: ${SPRING_DATASOURCE_AUTH_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_AUTH_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ==================== Elasticsearch ====================
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://yowyob-elasticsearch:9200}

  # ==================== RabbitMQ ====================
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

  # ==================== Redis ====================
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

  # ==================== Mail ====================
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ==================== Multi-Datasource (Users & Listings) ====================
app:
  datasource:
    users:
      url: ${SPRING_DATASOURCE_USERS_URL:jdbc:postgresql://yowyob-postgres:5432/yowyob_users}
      username: ${SPRING_DATASOURCE_USERS_USERNAME:postgres}
      password: ${SPRING_DATASOURCE_USERS_PASSWORD:postgres}
    listings:
      url: ${SPRING_DATASOURCE_LISTINGS_URL:jdbc:postgresql://yowyob-postgres:5432/yowyob_listings}
      username: ${SPRING_DATASOURCE_LISTINGS_USERNAME:postgres}
      password: ${SPRING_DATASOURCE_LISTINGS_PASSWORD:postgres}
  nominatim:
    url: ${APP_NOMINATIM_URL:https://nominatim.openstreetmap.org}
    user-agent: ${APP_NOMINATIM_USER_AGENT:Yowyob-Service-1.0 (contact@yowyob.com)}
  ipapi:
    url: ${APP_IPAPI_URL:https://ipapi.co}

# ==================== JWT ====================
jwt:
  secret: ${JWT_SECRET:yowyob-super-secret-key-change-this-in-production-minimum-256-bits}
  expiration: ${JWT_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# ==================== Google Auth ====================
google:
  client-id: ${GOOGLE_CLIENT_ID:763004243989-g1fftlketknf2ip32f0fsi39ukcqqkq3.apps.googleusercontent.com}

# ==================== CORS ====================
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://yowyob.com}
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# ==================== Actuator ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://tempo:9411/api/v2/spans}

# ==================== Swagger ====================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
