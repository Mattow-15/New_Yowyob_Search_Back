server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: app-logs
    static_configs:
      - targets:
          - api-gateway
        labels:
          job: app-logs
          app_name: api-gateway
          __path__: /var/log/app/**/*.log
